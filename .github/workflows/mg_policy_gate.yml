name: MetaGenesis Policy Gate

on:
  pull_request:
    branches:
      - main
      - develop
    types:
      - opened
      - synchronize
      - reopened

jobs:
  policy-gate:
    name: Policy Gate Enforcement
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base ref
        run: |
          git fetch origin ${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Policy Gate
        run: |
          echo "==========================================================="
          echo "MetaGenesis Policy Gate"
          echo "==========================================================="
          echo "Base: origin/${{ github.base_ref }}"
          echo "Head: HEAD"
          echo "PR: #${{ github.event.pull_request.number }}"
          echo "==========================================================="
          echo ""

          python scripts/mg_policy_gate.py \
            --policy scripts/mg_policy_gate_policy.json \
            --base origin/${{ github.base_ref }} \
            --head HEAD

      - name: Policy Gate Result
        if: failure()
        run: |
          echo ""
          echo "==========================================================="
          echo "POLICY GATE FAILED"
          echo "==========================================================="
          echo ""
          echo "This PR modifies restricted paths."
          echo "See scripts/mg_policy_gate_policy.json for policy."
          echo "Review the violation details above and adjust your changes."
          echo ""
          exit 1

name: Weekly Agent Health Check

on:
  schedule:
    - cron: '0 9 * * *'  # Every day 9:00 UTC
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write

jobs:
  agent-health:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONIOENCODING: utf-8
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Agent research (execute next pending task)
        run: |
          python scripts/agent_research.py || true

      - name: Agent signals (external relay)
        run: |
          python scripts/agent_signals.py || true

      - name: Agent evolution (19-check health)
        run: |
          python scripts/agent_evolution.py --summary

      - name: Agent semantic audit (project coherence)
        run: |
          python scripts/agent_audit.py --summary || true

      - name: Agent chronicle (version snapshot)
        run: |
          python scripts/agent_chronicle.py --summary

      - name: Agent coverage (quality analysis)
        run: |
          python scripts/agent_coverage.py --summary || true

      - name: Agent self-improvement
        run: |
          python scripts/agent_evolve_self.py --summary || true

      - name: Agent pattern promoter (recursive governance)
        run: |
          python scripts/agent_pattern_promoter.py || true

      - name: Agent learning (observe and record)
        run: |
          python scripts/agent_learn.py observe

      - name: Auto-commit agent reports
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/ .agent_memory/ || true
          git diff --cached --quiet || git commit -m "chore: auto-commit agent health reports [skip ci]"
          git push || true

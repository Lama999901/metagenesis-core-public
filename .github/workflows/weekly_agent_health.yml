name: Weekly Agent Health Check

on:
  schedule:
    - cron: '0 9 * * *'  # Every day 9:00 UTC
  workflow_dispatch:       # Manual trigger

permissions:
  contents: read

jobs:
  agent-health:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PYTHONIOENCODING: utf-8
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Agent research (execute next pending task)
        run: |
          python scripts/agent_research.py

      - name: Agent learning (observe and record)
        run: |
          python scripts/agent_learn.py observe

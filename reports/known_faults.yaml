  - fault_id: "FAULT_009"
    category: "PROTOCOL_SCOPE"
    severity: "INFO"
    description: >
      kB and NA are exact (zero uncertainty) because they are DEFINED by
      SI 2019, not measured. This is a feature, not a limitation — but
      should be documented. This makes PHYS-01 and PHYS-02 anchors
      stronger than NIST-measured constants (MTR series), not weaker.
      SI 2019 redefinition intentionally fixed these values.
    affected_claims: ["PHYS-01", "PHYS-02"]
    status: "FAULT_EXPECTED"
    ticket_ref: "https://github.com/Lama999901/metagenesis-core-public/issues"
    mitigation: "No action needed. SI 2019 exact definition strengthens the physical anchor. Documented for clarity."

  - fault_id: "FAULT_010"
    category: "PLATFORM_COMPATIBILITY"
    severity: "EXPECTED"
    description: >
      Windows default encoding (cp1252) causes UnicodeEncodeError when
      scripts print Unicode characters (checkmarks, arrows, emoji).
      Every Python script in the project includes a workaround:
      io.TextIOWrapper(sys.stdout.buffer, encoding='utf-8', errors='replace').
      This is a Windows platform limitation, not a protocol defect.
      Linux and macOS use UTF-8 by default and are unaffected.
    affected_claims: []
    status: "FAULT_EXPECTED"
    ticket_ref: "https://github.com/Lama999901/metagenesis-core-public/issues"
    mitigation: "All scripts include UTF-8 stdout wrapper. New scripts must include the same pattern. See CLAUDE.md BUG 4."

  - fault_id: "FAULT_011"
    category: "PLATFORM_COMPATIBILITY"
    severity: "EXPECTED"
    description: >
      SHA-256 hashes are sensitive to line ending differences (CRLF on
      Windows vs LF on Linux/macOS). A bundle created on one platform
      could fail verification on another if raw file bytes are hashed.
      The project provides fingerprint_file() in backend/progress/data_integrity.py
      which normalizes line endings before hashing. Using hashlib.sha256()
      directly on file bytes (without normalization) will produce
      platform-dependent hashes. This is a known cross-platform issue,
      not a protocol defect.
    affected_claims: []
    status: "FAULT_EXPECTED"
    ticket_ref: "https://github.com/Lama999901/metagenesis-core-public/issues"
    mitigation: "Always use fingerprint_file() from data_integrity.py instead of raw hashlib. See CLAUDE.md BUG 2."


  - fault_id: "SCOPE_001"
    category: "PROTOCOL_SCOPE"
    severity: "EXPECTED"
    description: >
      Physical anchor traceability (verification grounded in measured physical constants)
      applies ONLY to domains with known physical constants:
      materials science (MTR-1/2/3/4/5/6), fundamental physics (PHYS-01/02),
      structural mechanics (DT-FEM-01), drift monitoring (DRIFT-01),
      and calibration convergence (DT-CALIB-LOOP-01).
      For ML accuracy (ML_BENCH-01), data pipelines (DATA-PIPE-01), and financial risk
      models, the protocol provides tamper-evident provenance only — not physical anchoring.
      Thresholds in these domains (e.g. |Δaccuracy| ≤ 0.02) are chosen conventions,
      not physical constants. This is intentional and not a defect.
    affected_claims: ["ML_BENCH-01", "ML_BENCH-02", "ML_BENCH-03", "DATA-PIPE-01", "SYSID-01", "PHARMA-01", "FINRISK-01", "DT-SENSOR-01", "AGENT-DRIFT-01"]
    status: "FAULT_EXPECTED"
    ticket_ref: "https://github.com/Lama999901/metagenesis-core-public/issues"
    mitigation: "Use physical anchor chain (MTR-1/2/3/4/5/6 -> DT-FEM-01 -> DRIFT-01 -> DT-CALIB-LOOP-01, PHYS-01/02) for domains requiring traceability to physical reality."

  - fault_id: "ENV_002"
    category: "TEST_COVERAGE_CEILING"
    severity: "EXPECTED"
    description: >
      deep_verify.py (288 lines) reports 0% test coverage. This is not a gap
      but a structural ceiling. deep_verify.py works by spawning pytest as a
      subprocess and parsing its output — the function load_module() uses
      subprocess.run() to invoke Python on each proof test individually.
      Testing this via pytest would require pytest testing itself through a
      subprocess chain, which is circular and produces no additional confidence.
      The 13 proof tests that deep_verify.py orchestrates ARE the tests —
      they run directly in the main test suite (2407 tests) and are verified
      by CERT-02 through CERT-12. Excluding deep_verify.py, code coverage
      is 91.9%. This is the honest ceiling. Reporting 88% overall (including
      the untestable orchestrator) would misrepresent the actual state of
      test coverage for the testable codebase.
    affected_claims: []
    status: "FAULT_EXPECTED"
    ticket_ref: "https://github.com/Lama999901/metagenesis-core-public/issues"
    mitigation: "deep_verify.py is validated by its output: ALL 13 TESTS PASSED. The orchestrator is tested by running it."

  - fault_id: "FAULT_004"
    category: "CRYPTOGRAPHIC_THREAT"
    severity: "EXPECTED"
    description: >
      SHA-256 and Ed25519 are not quantum-resistant. A sufficiently powerful
      quantum computer running Grover's algorithm could weaken SHA-256 from
      256-bit to 128-bit security, and Shor's algorithm could break Ed25519
      entirely. Timeline: NIST estimates 15-30 years for cryptographically
      relevant quantum computers. Mitigation: protocol is designed for
      algorithm substitution — SHA-256 can be replaced with SHA-3 or a
      post-quantum hash, Ed25519 with CRYSTALS-Dilithium, without changing
      the verification architecture. No action needed before 2035.
    affected_claims: []
    status: "FAULT_EXPECTED"
    ticket_ref: "https://github.com/Lama999901/metagenesis-core-public/issues"
    mitigation: "Monitor NIST PQC standardization. Protocol supports algorithm substitution without architectural change."

  - fault_id: "FAULT_005"
    category: "TRUST_MODEL"
    severity: "EXPECTED"
    description: >
      The protocol operates under a trusted verifier assumption: the party
      running mg_verify_standalone.py is assumed to have an unmodified copy
      of the verifier. A compromised verifier could report PASS on tampered
      bundles. This is analogous to trusting your compiler — it is a
      fundamental assumption, not a defect. Mitigation: the standalone
      verifier is a single file (~580 lines) that can be audited by
      inspection. Its SHA-256 hash can be published and checked independently.
    affected_claims: []
    status: "FAULT_EXPECTED"
    ticket_ref: "https://github.com/Lama999901/metagenesis-core-public/issues"
    mitigation: "Publish verifier hash with each release. Single-file design enables manual audit."

  - fault_id: "FAULT_006"
    category: "PROTOCOL_SCOPE"
    severity: "EXPECTED"
    description: >
      MetaGenesis Core proves WHAT was computed, HOW it was computed, and
      WHEN it was computed — but not WHETHER the computation is correct.
      If a claim template has a bug (e.g. wrong formula), the protocol
      will faithfully certify the wrong result. Algorithm correctness is
      the responsibility of the claim author, not the verification protocol.
      This is by design: a notary certifies that a document was signed,
      not that its contents are true.
    affected_claims: []
    status: "FAULT_EXPECTED"
    ticket_ref: "https://github.com/Lama999901/metagenesis-core-public/issues"
    mitigation: "Peer review claim templates independently. Protocol scope is provenance, not correctness."


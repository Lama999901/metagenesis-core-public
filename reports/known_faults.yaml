    affected_claims: ["ML_BENCH-01", "ML_BENCH-02", "ML_BENCH-03", "DATA-PIPE-01", "SYSID-01", "PHARMA-01", "FINRISK-01", "DT-SENSOR-01", "AGENT-DRIFT-01"]
